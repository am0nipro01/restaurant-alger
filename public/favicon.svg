<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond sombre charcoal -->
  <rect width="32" height="32" fill="#1b1c1a"/>
  <!-- Trait décoratif haut -->
  <line x1="8" y1="6" x2="24" y2="6" stroke="#8c5925" stroke-width="0.6" opacity="0.6"/>
  <!-- Monogramme AG -->
  <text
    x="16"
    y="21"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="400"
    fill="#8c5925"
    text-anchor="middle"
    letter-spacing="1.5"
  >AG</text>
  <!-- Trait décoratif bas -->
  <line x1="8" y1="26" x2="24" y2="26" stroke="#8c5925" stroke-width="0.6" opacity="0.6"/>
</svg>
