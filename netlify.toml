[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Variable d'environnement en production
[context.production.environment]
  VITE_SITE_URL = "https://algiersgastronomy.dz"

# Cache headers pour les fichiers SEO statiques
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/xml; charset=utf-8"

# SPA fallback — toutes les routes vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
